<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Notes</title>
<script src="./node_modules/marked/lib/marked.umd.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green-950: #0a1f13;
  --green-900: #0f2e1a;
  --green-850: #133822;
  --green-800: #1a4a2e;
  --green-700: #22633d;
  --green-600: #2d7a4d;
  --green-500: #3a9960;
  --green-400: #5ab87a;
  --green-300: #88d4a0;
  --green-200: #b8e8c8;
  --green-100: #e0f5e8;
  --green-50:  #f0faf4;

  --surface-0: #080f0b;
  --surface-1: #0d1a12;
  --surface-2: #12231a;
  --surface-3: #182e22;
  --surface-4: #1e3a2c;

  --text-primary: #e8f0eb;
  --text-secondary: #9aafa1;
  --text-tertiary: #5e7568;
  --text-accent: #5ab87a;

  --border: rgba(90, 184, 122, 0.1);
  --border-active: rgba(90, 184, 122, 0.25);

  --radius-s: 6px;
  --radius-m: 10px;
  --radius-l: 14px;

  --shadow-float: 0 8px 32px rgba(0,0,0,0.4);
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --editor-font-family: 'Cascadia Code', 'Consolas', monospace;
  --preview-font-family: 'Georgia', 'Cambria', serif;
  --editor-font-size: 14px;
  --preview-font-size: 15px;
  --note-card-padding: 14px;
  --editor-padding: 28px 48px;
}

html, body {
  height: 100%;
  font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  background: var(--surface-0);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Win11 title bar drag region */
.titlebar-drag {
  position: fixed;
  top: 0;
  left: 0;
  right: 140px; /* leave space for window controls */
  height: 36px;
  -webkit-app-region: drag;
  z-index: 10000;
  pointer-events: none;
}

/* ── App Shell ── */
.app {
  display: flex;
  height: 100vh;
  position: relative;
}

/* Noise texture overlay */
.app::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  user-select: none;
  position: relative;
  z-index: 10;
}

.sidebar-header {
  padding: 40px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--green-600), var(--green-400));
  border-radius: var(--radius-s);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--green-950);
  font-weight: 600;
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-family: 'Georgia', 'Cambria', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.sidebar-search {
  padding: 4px 14px 14px;
}

.sidebar-search input {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text-primary);
  font-size: 12.5px;
  outline: none;
  transition: border-color var(--transition);
  font-family: inherit;
}

.sidebar-search input::placeholder { color: var(--text-tertiary); }
.sidebar-search input:focus { border-color: var(--border-active); }

.sidebar-section-title {
  padding: 8px 18px 6px;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  font-weight: 600;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 2px; }

.notebook-list {
  padding: 0 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.notebook-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: var(--radius-s);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  transition: background var(--transition);
}

.notebook-item:hover,
.notebook-item.active {
  background: var(--surface-2);
  color: var(--text-primary);
}

.notebook-item .count {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-tertiary);
}

.notebook-add {
  margin: 0 14px 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-s);
  cursor: pointer;
  transition: background var(--transition);
  font-size: 13px;
  color: var(--text-secondary);
}

.nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
.nav-item.active { background: var(--surface-3); color: var(--text-accent); }

.nav-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  opacity: 0.7;
}

.nav-item.active svg { opacity: 1; }

.nav-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-tertiary);
  min-width: 18px;
  text-align: right;
}

.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
}

.btn-new {
  width: 100%;
  padding: 9px 14px;
  background: linear-gradient(135deg, var(--green-700), var(--green-600));
  border: none;
  border-radius: var(--radius-s);
  color: var(--green-50);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: inherit;
}

.btn-new:hover {
  background: linear-gradient(135deg, var(--green-600), var(--green-500));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(42, 122, 77, 0.3);
}

.btn-new:active { transform: translateY(0); }

/* ── Note List ── */
.note-list {
  width: 280px;
  min-width: 280px;
  background: var(--surface-0);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
}

.note-list-header {
  padding: 42px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}

.note-list-header h2 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

.note-list-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.note-list-sort {
  font-size: 11px;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: var(--radius-s);
  transition: background var(--transition);
}

.note-list-sort:hover { background: var(--surface-2); }

.toolbar-chip-btn {
  padding: 5px 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text-secondary);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.toolbar-chip-btn:hover {
  background: var(--surface-3);
  color: var(--text-primary);
}

.note-list-items {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

.note-list-items::-webkit-scrollbar { width: 4px; }
.note-list-items::-webkit-scrollbar-track { background: transparent; }
.note-list-items::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

.note-card {
  padding: var(--note-card-padding);
  border-radius: var(--radius-m);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
  border: 1px solid transparent;
}

.note-card:hover {
  background: var(--surface-1);
}

.note-card.active {
  background: var(--surface-2);
  border-color: var(--border-active);
}

.note-card-title {
  font-family: 'Georgia', 'Cambria', serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.note-card-preview {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.note-card-meta {
  margin-top: 8px;
  font-size: 10.5px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.note-card-meta .tag {
  background: rgba(90, 184, 122, 0.1);
  color: var(--text-accent);
  padding: 1px 7px;
  border-radius: 20px;
  font-size: 10px;
}

/* ── Editor ── */
.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--surface-0);
  min-width: 0;
  position: relative;
}

/* Paper grain texture for editor */
.editor-pane::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.015;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 28px,
    rgba(90, 184, 122, 0.3) 28px,
    rgba(90, 184, 122, 0.3) 29px
  );
}

.editor-toolbar {
  padding: 12px 24px;
  padding-top: 40px;
  display: flex;
  align-items: center;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.toolbar-btn {
  padding: 6px 10px;
  background: transparent;
  border: none;
  border-radius: var(--radius-s);
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: inherit;
}

.toolbar-btn:hover { background: var(--surface-2); color: var(--text-secondary); }
.toolbar-btn.active { background: var(--surface-3); color: var(--text-accent); }

.toolbar-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 6px;
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.save-status {
  min-width: 56px;
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: right;
  padding: 4px 2px;
  transition: color var(--transition);
}

.save-status.saved { color: var(--text-accent); }
.save-status.error { color: #e06060; }

.word-count {
  font-size: 11px;
  color: var(--text-tertiary);
  padding: 4px 10px;
}

.editor-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.note-meta-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 2;
  flex-wrap: wrap;
}

.note-meta-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.tag-list {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(90, 184, 122, 0.1);
  border: 1px solid rgba(90, 184, 122, 0.16);
  color: var(--green-200);
  border-radius: 999px;
  font-size: 11px;
}

.tag-chip button {
  background: transparent;
  border: none;
  color: inherit;
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
}

.tag-input {
  min-width: 160px;
  padding: 7px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
  font-family: inherit;
}

.tag-input:focus {
  border-color: var(--border-active);
}

.notebook-select,
.settings-select,
.settings-input {
  min-width: 140px;
  padding: 7px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
  font-family: inherit;
}

.note-meta-spacer {
  margin-left: auto;
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
}

.settings-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.settings-field label {
  font-size: 12px;
  color: var(--text-secondary);
}

.history-modal,
.quick-search-modal {
  position: fixed;
  inset: 0;
  background: rgba(3, 8, 5, 0.72);
  backdrop-filter: blur(10px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  padding: 20px;
}

.history-modal.show,
.quick-search-modal.show {
  display: flex;
}

.modal-panel {
  width: min(760px, 100%);
  max-height: min(82vh, 900px);
  background: linear-gradient(180deg, rgba(18, 35, 26, 0.98), rgba(8, 15, 11, 0.98));
  border: 1px solid var(--border-active);
  border-radius: 18px;
  box-shadow: var(--shadow-float);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 18px;
}

.modal-body {
  overflow: auto;
  padding: 12px;
}

.history-list,
.quick-search-results {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item,
.quick-result {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-m);
  padding: 14px;
}

.quick-result {
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}

.quick-result.active,
.quick-result:hover {
  background: var(--surface-2);
  border-color: var(--border-active);
}

.history-item-header,
.quick-result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.history-item-title,
.quick-result-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.history-item-meta,
.quick-result-meta {
  font-size: 11px;
  color: var(--text-tertiary);
}

.history-item-preview,
.quick-result-preview {
  color: var(--text-secondary);
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.history-item-actions {
  margin-top: 10px;
  display: flex;
  justify-content: flex-end;
}

.history-empty,
.quick-search-empty {
  padding: 24px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
}

.quick-search-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  margin-bottom: 12px;
  font-family: inherit;
}

.quick-search-help {
  padding: 0 4px 10px;
  font-size: 11px;
  color: var(--text-tertiary);
}

.editor-write {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.editor-write textarea {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--editor-font-family);
  font-size: var(--editor-font-size);
  line-height: 1.8;
  padding: var(--editor-padding);
  tab-size: 2;
  caret-color: var(--green-400);
}

.editor-write textarea::placeholder {
  color: var(--text-tertiary);
  font-family: 'Georgia', 'Cambria', serif;
  font-style: italic;
}

.editor-write textarea::-webkit-scrollbar { width: 6px; }
.editor-write textarea::-webkit-scrollbar-track { background: transparent; }
.editor-write textarea::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

.editor-preview {
  flex: 1;
  overflow-y: auto;
  padding: var(--editor-padding);
  display: none;
}

.editor-preview.visible { display: block; }
.editor-write.hidden { display: none; }

.editor-preview::-webkit-scrollbar { width: 6px; }
.editor-preview::-webkit-scrollbar-track { background: transparent; }
.editor-preview::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

/* ── Markdown Preview Styles ── */
.editor-preview {
  font-family: var(--preview-font-family);
  font-size: var(--preview-font-size);
  line-height: 1.8;
  color: var(--text-primary);
}

.editor-preview h1 {
  font-size: 28px;
  font-weight: 600;
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  color: var(--green-200);
  letter-spacing: -0.02em;
}

.editor-preview h2 {
  font-size: 22px;
  font-weight: 600;
  margin: 28px 0 12px;
  color: var(--green-300);
  letter-spacing: -0.01em;
}

.editor-preview h3 {
  font-size: 17px;
  font-weight: 600;
  margin: 24px 0 8px;
  color: var(--green-300);
}

.editor-preview p { margin: 0 0 14px; }

.editor-preview a {
  color: var(--text-accent);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.editor-preview strong { color: var(--green-200); font-weight: 600; }
.editor-preview em { font-style: italic; color: var(--green-300); }

.editor-preview code {
  font-family: 'Cascadia Code', 'Consolas', monospace;
  background: var(--surface-2);
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 0.88em;
  color: var(--green-300);
}

.editor-preview pre {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-m);
  padding: 18px 20px;
  margin: 16px 0;
  overflow-x: auto;
}

.editor-preview pre code {
  background: transparent;
  padding: 0;
  font-size: 13px;
  line-height: 1.7;
}

.editor-preview blockquote {
  border-left: 3px solid var(--green-700);
  padding: 4px 0 4px 20px;
  margin: 14px 0;
  color: var(--text-secondary);
  font-style: italic;
}

.editor-preview ul, .editor-preview ol {
  padding-left: 24px;
  margin: 8px 0 14px;
}

.editor-preview li { margin-bottom: 4px; }

.editor-preview li::marker { color: var(--green-600); }

.editor-preview hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

.editor-preview img { max-width: 100%; border-radius: var(--radius-m); }

.editor-preview table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 13.5px;
}

.editor-preview th, .editor-preview td {
  padding: 8px 14px;
  border: 1px solid var(--border);
  text-align: left;
}

.editor-preview th {
  background: var(--surface-2);
  font-weight: 600;
  color: var(--green-200);
}

/* Checkbox styling */
.editor-preview input[type="checkbox"] {
  accent-color: var(--green-500);
  margin-right: 6px;
  transform: scale(1.1);
}

/* ── Empty State ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  gap: 12px;
}

.empty-state svg { opacity: 0.3; }
.empty-state p { font-size: 13px; font-style: italic; font-family: 'Georgia', 'Cambria', serif; }

/* ── Context Menu ── */
.context-menu {
  position: fixed;
  background: var(--surface-2);
  border: 1px solid var(--border-active);
  border-radius: var(--radius-m);
  padding: 4px;
  min-width: 160px;
  box-shadow: var(--shadow-float);
  z-index: 1000;
  display: none;
}

.context-menu.show { display: block; }

.context-menu-item {
  padding: 8px 14px;
  font-size: 12.5px;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: var(--radius-s);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
}

.context-menu-item:hover {
  background: var(--surface-3);
  color: var(--text-primary);
}

.context-menu-item.danger { color: #e06060; }
.context-menu-item.danger:hover { background: rgba(224, 96, 96, 0.1); }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.note-card { animation: fadeIn 0.25s ease both; }

/* ── Responsive ── */
@media (max-width: 860px) {
  .sidebar { width: 56px; min-width: 56px; }
  .sidebar-header h1, .sidebar-search, .sidebar-section-title,
  .nav-item span, .nav-count, .notebook-list, .notebook-add { display: none; }
  .sidebar-header { justify-content: center; padding: 16px 0 12px; }
  .nav-item { justify-content: center; padding: 10px; }
  .sidebar-footer { padding: 8px; }
  .btn-new span { display: none; }
  .note-list { width: 240px; min-width: 240px; }
}

@media (max-width: 640px) {
  .note-list { display: none; }
  .editor-write textarea { padding: 20px 24px; }
  .editor-preview { padding: 20px 24px; }
}

/* ── Scrollbar for Win11 ── */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--surface-4) transparent;
}
</style>
</head>
<body>

<div class="titlebar-drag"></div>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">P</div>
      <h1>Pine Notes</h1>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索笔记…" id="searchInput" />
    </div>
    <div class="sidebar-section-title">笔记本</div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-filter="all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v16H4z" rx="2"/><path d="M9 4v16"/></svg>
        <span>全部笔记</span>
        <span class="nav-count" id="countAll">0</span>
      </div>
      <div class="nav-item" data-filter="starred">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
        <span>收藏</span>
        <span class="nav-count" id="countStarred">0</span>
      </div>
      <div class="nav-item" data-filter="archived">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="5" rx="1"/><path d="M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8"/><path d="M10 12h4"/></svg>
        <span>归档</span>
        <span class="nav-count" id="countArchived">0</span>
      </div>
    </nav>
    <div class="sidebar-section-title">笔记本</div>
    <div class="notebook-list" id="notebookList"></div>
    <div class="notebook-add">
      <button class="toolbar-chip-btn" id="btnNewNotebook" type="button">新建笔记本</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-new" id="btnNew">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>新建笔记</span>
      </button>
    </div>
  </aside>

  <!-- Note List -->
  <section class="note-list">
    <div class="note-list-header">
      <h2>全部笔记</h2>
      <div class="note-list-actions">
        <button class="toolbar-chip-btn" id="btnQuickSearch" title="快速搜索 Ctrl+K">搜索</button>
        <span class="note-list-sort" id="sortToggle">最近修改</span>
      </div>
    </div>
    <div class="note-list-items" id="noteListItems"></div>
  </section>

  <!-- Editor -->
  <main class="editor-pane" id="editorPane">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 3v4a1 1 0 001 1h4"/><path d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z"/><line x1="9" y1="9" x2="10" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
      <p>选择一篇笔记，或创建新的</p>
    </div>
    <div class="editor-toolbar" id="editorToolbar" style="display:none">
      <button class="toolbar-btn" title="粗体 Ctrl+B" data-action="bold"><b>B</b></button>
      <button class="toolbar-btn" title="斜体 Ctrl+I" data-action="italic"><i>I</i></button>
      <button class="toolbar-btn" title="代码" data-action="code"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
      <button class="toolbar-btn" title="链接" data-action="link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
      <button class="toolbar-btn" title="插入图片" id="btnImage"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
      <button class="toolbar-btn" title="列表" data-action="list">—</button>
      <button class="toolbar-btn" title="待办" data-action="todo">☑</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="标题" data-action="heading">H</button>
      <button class="toolbar-btn" title="引用" data-action="quote">"</button>
      <div class="toolbar-right">
        <button class="toolbar-chip-btn" id="btnRestore" title="从备份还原">还原</button>
        <button class="toolbar-chip-btn" id="btnExport" title="导出当前笔记">导出</button>
        <button class="toolbar-chip-btn" id="btnExportAll" title="导出全部 Markdown">导出全部</button>
        <button class="toolbar-chip-btn" id="btnPdf" title="导出 PDF">PDF</button>
        <button class="toolbar-chip-btn" id="btnPrint" title="打印当前笔记">打印</button>
        <button class="toolbar-chip-btn" id="btnBackup" title="备份全部笔记">备份</button>
        <button class="toolbar-chip-btn" id="btnImport" title="导入 Markdown">导入</button>
        <button class="toolbar-chip-btn" id="btnHistory" title="查看版本历史">历史</button>
        <button class="toolbar-chip-btn" id="btnPin" title="置顶笔记">置顶</button>
        <button class="toolbar-chip-btn" id="btnMoveUp" title="手动上移">上移</button>
        <button class="toolbar-chip-btn" id="btnMoveDown" title="手动下移">下移</button>
        <button class="toolbar-chip-btn" id="btnSettings" title="显示设置">设置</button>
        <span class="save-status" id="saveStatus"></span>
        <span class="word-count" id="wordCount">0 字</span>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" id="btnPreview" title="预览 Ctrl+P">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span style="font-size:12px">预览</span>
        </button>
        <button class="toolbar-btn" id="btnStar" title="收藏">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" id="starIcon"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
        </button>
        <button class="toolbar-btn" id="btnDelete" title="删除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
    <div class="note-meta-bar" id="noteMetaBar">
      <span class="note-meta-label">笔记本</span>
      <select class="notebook-select" id="notebookSelect"></select>
      <span class="note-meta-label">标签</span>
      <div class="tag-list" id="tagList"></div>
      <input class="tag-input" id="tagInput" type="text" placeholder="输入标签后按 Enter" />
      <span class="note-meta-spacer"></span>
      <span class="note-meta-label" id="lastOpenedLabel"></span>
    </div>
    <div class="editor-container" id="editorContainer" style="display:none">
      <div class="editor-write" id="editorWrite">
        <textarea id="editor" placeholder="在此书写你的想法…" spellcheck="false"></textarea>
      </div>
      <div class="editor-preview" id="editorPreview"></div>
    </div>
  </main>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none" multiple />

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" data-action="star">⭐ 收藏 / 取消收藏</div>
  <div class="context-menu-item" data-action="archive">📦 归档</div>
  <div class="context-menu-item" data-action="duplicate">📋 复制</div>
  <div class="context-menu-item danger" data-action="delete">🗑 删除</div>
</div>

<div class="history-modal" id="historyModal">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">版本历史</div>
      <button class="modal-close" id="btnCloseHistory" aria-label="关闭">×</button>
    </div>
    <div class="modal-body">
      <div class="history-list" id="historyList"></div>
      <div class="history-empty" id="historyEmpty" style="display:none">这篇笔记还没有历史快照。</div>
    </div>
  </div>
</div>

<div class="quick-search-modal" id="quickSearchModal">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">快速搜索</div>
      <button class="modal-close" id="btnCloseQuickSearch" aria-label="关闭">×</button>
    </div>
    <div class="modal-body">
      <input class="quick-search-input" id="quickSearchInput" type="text" placeholder="搜索标题、内容或标签…" />
      <div class="quick-search-help">Enter 打开，↑ ↓ 切换，Esc 关闭</div>
      <div class="quick-search-results" id="quickSearchResults"></div>
      <div class="quick-search-empty" id="quickSearchEmpty" style="display:none">没有找到匹配的笔记。</div>
    </div>
  </div>
</div>

<div class="history-modal" id="settingsModal">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">显示与编辑设置</div>
      <button class="modal-close" id="btnCloseSettings" aria-label="关闭">×</button>
    </div>
    <div class="modal-body">
      <div class="settings-grid">
        <div class="settings-field">
          <label for="themeSelect">主题</label>
          <select class="settings-select" id="themeSelect">
            <option value="forest">Forest</option>
            <option value="paper">Paper</option>
            <option value="midnight">Midnight</option>
          </select>
        </div>
        <div class="settings-field">
          <label for="editorFontSizeInput">编辑字体大小</label>
          <input class="settings-input" id="editorFontSizeInput" type="number" min="12" max="24" step="1" />
        </div>
        <div class="settings-field">
          <label for="previewFontSizeInput">预览字体大小</label>
          <input class="settings-input" id="previewFontSizeInput" type="number" min="12" max="28" step="1" />
        </div>
        <div class="settings-field">
          <label for="editorFontFamilyInput">编辑字体</label>
          <input class="settings-input" id="editorFontFamilyInput" type="text" />
        </div>
        <div class="settings-field">
          <label for="previewFontFamilyInput">预览字体</label>
          <input class="settings-input" id="previewFontFamilyInput" type="text" />
        </div>
        <div class="settings-field">
          <label for="uiDensitySelect">界面密度</label>
          <select class="settings-select" id="uiDensitySelect">
            <option value="compact">Compact</option>
            <option value="comfortable">Comfortable</option>
            <option value="airy">Airy</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./renderer.js"></script>
</body>
</html>
